name: Car Cover Reminder
options:
  bundleIdPrefix: com.shimondeitel.covercheck
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Car Cover Reminder:
    type: application
    platform: iOS
    sources:
      - path: Car Cover Reminder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.covercheck
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Car Cover Reminder/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Car Cover ReminderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Car Cover ReminderTests
      - path: Car Cover Reminder.storekit
    dependencies:
      - target: Car Cover Reminder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.covercheck.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Car Cover ReminderUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Car Cover ReminderUITests
    dependencies:
      - target: Car Cover Reminder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.covercheck.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Car Cover Reminder:
    build:
      targets:
        Car Cover Reminder: all
        Car Cover ReminderTests: [test]
        Car Cover ReminderUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Car Cover Reminder.storekit
    test:
      config: Debug
      storeKitConfiguration: Car Cover Reminder.storekit
      targets:
        - Car Cover ReminderTests
        - Car Cover ReminderUITests
    archive:
      config: Release
